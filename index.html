<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MI EXPERIENCIA ESCOLAR PUEDE MEJORAR LA TUYA</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #F3FFF6; /* fondo verde pastel muy suave */
}

/* NAV */
nav {
  background: #B5EAD7; /* verde pastel */
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

nav ul {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

/* MENÚ PRINCIPAL */
nav ul li {
  position: relative;
}

nav ul li a {
  display: block;
  padding: 15px 25px;
  color: #355F5C;
  text-decoration: none;
  font-weight: bold;
  border-radius: 10px;
  transition: 0.3s;
}

/* HOVER LILA */
nav ul li a:hover {
  background: #E0BBE4; /* lila pastel */
  color: #4B3F72;
  transform: scale(1.05);
}

/* SUBMENÚ */
nav ul li ul {
  display: none;
  position: absolute;
  background: #DFF5E1; /* verde claro */
  min-width: 160px;
  border-radius: 12px;
  box-shadow: 0 6px 12px rgba(0,0,0,0.1);
  overflow: hidden;
}

nav ul li ul li a {
  padding: 12px;
  color: #355F5C;
}

/* HOVER SUBMENÚ */
nav ul li ul li a:hover {
  background: #E0BBE4; /* lila */
}

/* MOSTRAR SUBMENÚ */
nav ul li:hover ul {
  display: block;
}

/* RESPONSIVO */
@media (max-width: 600px) {
  nav ul {
    flex-direction: column;
    align-items: center;
  }

  nav ul li {
    width: 100%;
    text-align: center;
  }

  nav ul li ul {
    position: static;
  }
}
</style>
</head>

<body>

<nav>
<ul>

  <li>
    <a href="#">MENÚ 1</a>
    <ul>
      <li><a href="#">Submenú 1</a></li>
    </ul>
  </li>

  <li>
    <a href="#">MENÚ 2</a>
    <ul>
      <li><a href="#">Submenú 2</a></li>
    </ul>
  </li>

  <li>
    <a href="#">MENÚ 3</a>
    <ul>
      <li><a href="#">Submenú 3</a></li>
    </ul>
  </li>

  <li>
    <a href="#">MENÚ 4</a>
    <ul>
      <li><a href="#">Submenú 4</a></li>
    </ul>
  </li>

  <li>
    <a href="#">MENÚ 5</a>
    <ul>
      <li><a href="#">Submenú 5</a></li>
    </ul>
  </li>

  <li>
    <a href="#">MENÚ 6</a>
    <ul>
      <li><a href="#">Submenú 6</a></li>
    </ul>
  </li>

</ul>
</nav>

</body>
</html>
