<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MI EXPERIENCIA ESCOLAR PUEDE MEJORAR LA TUYA</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #FFF7FB; /* fondo pastel */
}

/* NAV */
nav {
  background: linear-gradient(90deg, #FADADD, #E0BBE4, #D0F4DE);
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

nav ul {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

/* MENÚ PRINCIPAL */
nav ul li {
  position: relative;
}

nav ul li a {
  display: block;
  padding: 15px 25px;
  color: #5A4E6D;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
  border-radius: 10px;
}

nav ul li a:hover {
  background: #FFE5EC;
  transform: scale(1.05);
}

/* SUBMENÚ */
nav ul li ul {
  display: none;
  position: absolute;
  background: #FFFFFF;
  min-width: 160px;
  border-radius: 12px;
  box-shadow: 0 6px 12px rgba(0,0,0,0.1);
  overflow: hidden;
}

nav ul li ul li a {
  color: #6B6B6B;
  padding: 12px;
  display: block;
}

nav ul li ul li a:hover {
  background: #C7F9CC;
}

/* MOSTRAR SUBMENÚ */
nav ul li:hover ul {
  display: block;
}

/* RESPONSIVO */
@media (max-width: 600px) {
  nav ul {
    flex-direction: column;
    align-items: center;
  }

  nav ul li {
    width: 100%;
    text-align: center;
  }

  nav ul li ul {
    position: static;
  }
}
</style>
</head>

<body>

<nav>
<ul>

  <li>
    <a href="#">MENÚ 1</a>
    <ul>
      <li><a href="#">Submenú 1</a></li>
    </ul>
  </li>

  <li>
    <a href="#">MENÚ 2</a>
    <ul>
      <li><a href="#">Submenú 2</a></li>
    </ul>
  </li>

  <li>
    <a href="#">MENÚ 3</a>
    <ul>
      <li><a href="#">Submenú 3</a></li>
    </ul>
  </li>

  <li>
    <a href="#">MENÚ 4</a>
    <ul>
      <li><a href="#">Submenú 4</a></li>
    </ul>
  </li>

  <li>
    <a href="#">MENÚ 5</a>
    <ul>
      <li><a href="#">Submenú 5</a></li>
    </ul>
  </li>

  <li>
    <a href="#">MENÚ 6</a>
    <ul>
      <li><a href="#">Submenú 6</a></li>
    </ul>
  </li>

</ul>
</nav>

</body>
</html>
