<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MI EXPERIENCIA ESCOLAR PUEDE MEJORAR LA TUYA</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* NAV */
nav {
  background: #F8C8DC; /* rosa pastel */
}

nav ul {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  flex-wrap: wrap;
}

/* MENÚ PRINCIPAL */
nav ul li {
  position: relative;
}

nav ul li a {
  display: block;
  padding: 15px 20px;
  color: #5D3A66; /* morado suave */
  text-decoration: none;
  font-weight: bold;
}

nav ul li a:hover {
  background: #EEC9F1; /* lila pastel */
}

/* SUBMENÚ */
nav ul li ul {
  display: none;
  position: absolute;
  background: #DFF5E1; /* verde pastel */
  min-width: 150px;
}

nav ul li ul li a {
  color: #4A4A4A;
  padding: 10px;
}

nav ul li ul li a:hover {
  background: #B5EAD7; /* verde menta */
}

/* MOSTRAR SUBMENÚ */
nav ul li:hover ul {
  display: block;
}

/* RESPONSIVO */
@media (max-width: 600px) {
  nav ul {
    flex-direction: column;
  }

  nav ul li {
    width: 100%;
  }
}
</style>
</head>

<body>

<nav>
<ul>

  <li>
    <a href="#">MENÚ 1</a>
    <ul>
      <li><a href="#">Submenú 1</a></li>
    </ul>
  </li>

  <li>
    <a href="#">MENÚ 2</a>
    <ul>
      <li><a href="#">Submenú 2</a></li>
    </ul>
  </li>

  <li>
    <a href="#">MENÚ 3</a>
    <ul>
      <li><a href="#">Submenú 3</a></li>
    </ul>
  </li>

  <li>
    <a href="#">MENÚ 4</a>
    <ul>
      <li><a href="#">Submenú 4</a></li>
    </ul>
  </li>

  <li>
    <a href="#">MENÚ 5</a>
    <ul>
      <li><a href="#">Submenú 5</a></li>
    </ul>
  </li>

  <li>
    <a href="#">MENÚ 6</a>
    <ul>
      <li><a href="#">Submenú 6</a></li>
    </ul>
  </li>

</ul>
</nav>

</body>
</html>
