<title>Carrusel</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Contenedor */
.carrusel {
  position: relative;
  width: 95%;
  max-width: 600px;
  overflow: hidden;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.25);
  background: black; /* se ve mejor con contain */
}

/* Slides */
.slides {
  display: flex;
  transition: transform 0.6s ease-in-out;
  align-items: center; /* centra vertical */
}

/* IMÁGENES CORREGIDAS */
.slides img {
  width: 100%;
  height: auto; /* 👈 clave para que no se recorte */
  flex-shrink: 0;
}

/* Zoom suave */
.slides img:hover {
  transform: scale(1.03);
}
